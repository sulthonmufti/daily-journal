version: '3.8'

services:
  # Konfigurasi Database (MongoDB)
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Konfigurasi Backend (Node.js + Express.js)
  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/daily_journal
    depends_on:
      - mongo

  # Konfigurasi Frontend (React + Vite)
  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  mongo_data: